# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/user_db}
spring.datasource.username=myuser
spring.datasource.password=mypassword
spring.datasource.driver-class-name=org.postgresql.Driver

# Jpa
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
# Formats the SQL in the console so it's readable
spring.jpa.properties.hibernate.format_sql=true

# Flyway
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true

# Ensures Flyway runs before Hibernate validation
spring.jpa.properties.hibernate.validator.apply_to_ddl=false
spring.flyway.before-check-location=true